name: Generate UML Diagrams

on:
  push:
    paths:
      - "docs/uml/**/*.puml"
      - "docs/diagrams/**/*.svg"
  pull_request:
    paths:
      - "docs/uml/**/*.puml"
      - "docs/diagrams/**/*.svg"

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PlantUML + Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz
        
      # Always regenerate diagrams (source of truth is PUML)
      # TODO: Optimize SVG generation for large numbers of .puml files (only changes)
      - name: Generate all SVG diagrams
        run: |
          mkdir -p docs/diagrams
          
          find docs/uml -name '*.puml' | sort -f | while read -r PUML_FILE; do
            REL_PATH=${PUML_FILE#docs/uml/}
            REL_DIR=$(dirname "$REL_PATH")
            OUT_DIR="docs/diagrams/$REL_DIR"

            mkdir -p "$OUT_DIR"

            echo "Generating $PUML_FILE -> $OUT_DIR"
            plantuml -tsvg "$PUML_FILE" -o "$OUT_DIR"
          done

      - name: Debug - List generated SVG files
        run: |
          echo "SVG files found:"
          find . -name '*.svg' -print

      # Remove orphan SVG diagrams
      - name: Remove orphan SVG diagrams
        run: |
          for svg in $(find docs/diagrams -name '*.svg'); do
            REL_PATH=${svg#docs/diagrams/}
            PUML_FILE="docs/uml/${REL_PATH%.svg}.puml"
            if [ ! -f "$PUML_FILE" ]; then
              echo "Removing orphaned SVG: $svg"
              rm "$svg"
            fi
          done

      # Detect differences between generated SVGs and existing
      - name: Detect diagram changes
        id: diff
        run: |
          if git diff --quiet docs/diagrams; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Auto-fix on push
      - name: Commit generated diagrams
        if: github.event_name == 'push' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-action@github.com
          git add docs/diagrams
          git commit -m "Auto-generate UML diagrams"
          git push

      # Fail PR if diagrams are out of sync
      - name: Fail PR if diagrams differ and generate patch
        if: github.event_name == 'pull_request' && steps.diff.outputs.changed == 'true'
        run: |
          rm -f diagram-update.patch
          echo "Diagrams are out of sync with PlantUML sources."
          
          git add docs/diagrams
          git diff --cached > diagram-update.patch

          if [ ! -s diagram-update.patch ]; then
            echo "No actual differences found. Skipping patch creation."
            rm -f diagram-update.patch
            exit 1
          fi
          
          echo "A patch file 'diagram-update.patch' has been created."
          echo "You can apply it locally with:"
          echo "  git apply diagram-update.patch && git add docs/diagrams && git commit -m 'Update diagrams' && git push"
          exit 1

      # Upload diagram patch to fix failed PR locally
      - name: Upload diagram patch
        if: always() && github.event_name == 'pull_request' && steps.diff.outputs.changed == 'true' && hashFiles('diagram-update.patch') != ''
        uses: actions/upload-artifact@v4
        with:
          name: diagram-update-patch
          path: diagram-update.patch
          retention-days: 7

      # Add PR check summary
      - name: Add PR check summary (failure)
        if: always() && github.event_name == 'pull_request' && steps.diff.outputs.changed == 'true'&& hashFiles('diagram-update.patch') != ''
        run: |
          SHORT_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA=${SHORT_SHA:0:7}
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          cat <<EOF >> $GITHUB_STEP_SUMMARY
          **UML diagrams are out of sync**

          The generated SVG diagrams do not match the committed files.

          **Triggered by commit:** \`${SHORT_SHA}\`

          ---

          ### How to fix

          1. Download the patch from the workflow run:
          ${RUN_URL}

          2. In the **Artifacts** section, download:
          **diagram-update-patch**

          3. Apply it locally:

          \`\`\`bash
          git apply diagram-update.patch
          git add docs/diagrams
          git commit -m "fix: generated diagrams out of sync"
          git push
          \`\`\`
          EOF

      # Comment on PR when diagrams are out of sync
      - name: Comment on PR with fix instructions
        if: always() && github.event_name == 'pull_request' && steps.diff.outputs.changed == 'true' && hashFiles('diagram-update.patch') != ''
        uses: actions/github-script@v8
        with:
          script: |
            const marker = "<!-- uml-diagram-check -->";
            const shortSha = context.payload.pull_request.head.sha.substring(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `${marker}
            **UML diagrams are out of sync**

            The generated SVG diagrams do not match the committed files.

            **Triggered by commit:** \`${shortSha}\`

            ---

            ### How to fix

            1. Download the patch from the workflow run:
            ${runUrl}

            2. In the **Artifacts** section, download:
            **diagram-update-patch**

            3. Apply it locally:

            \`\`\`bash
            git apply diagram-update.patch
            git add docs/diagrams
            git commit -m "fix: generated diagrams out of sync"
            git push
            \`\`\`

            ---`;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
            
      - name: Update PR comment when diagrams are fixed
        if: always() && github.event_name == 'pull_request' && steps.diff.outputs.changed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- uml-diagram-check -->";

            const body = `${marker}
              **UML diagrams are up to date**

              All generated diagrams match the source \`.puml\` files.
              `;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
