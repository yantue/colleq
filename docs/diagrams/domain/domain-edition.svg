link ContentRole to MediaPackaging--><!--MD5=[0724f8690ac3724da60d87da4dba816a]
link ContentRole to DiscType--><!--MD5=[03502d43845044243d5a60932eb7ccfa]
link DiscType to RegionCode--><!--MD5=[4397e88d5c17d0f5d826617ff1bb2eda]
@startuml
skinparam classAttributeIconSize 0

class Edition <<AggregateRoot>> {
    +Id: UUID
    +Title: string
    +ReleaseDate: LocalDate
    +MediaWorks: List<UUID>
    +Packaging?: MediaPackaging
}

note top of Edition
Invariant:
- For each contentId in MediaContainer.Content,
  there exists an EditionContent with that contentId
end note

class EditionContent {
    ContentId: UUID
    Role: ContentRole
}

Edition "1" *- - "1..*" EditionContent

enum ContentRole {
    Main
    Bonus
}

class MediaContainer <<ValueObject>> {
    +Title?: string
    +Content: List<UUID>
}

Edition "1" *- - "1..*" MediaContainer

class DiscContainer {
    +Type: DiscType
    +RegionCodes?: List<RegionCode>
}

MediaContainer <|- - DiscContainer

enum MediaPackaging {
    Boxset
    Digipack
    Mediabook
    Slipcover
    Amaray
    Steelbook
}

enum DiscType {
    BluRay
    DVD
    UHD
}

enum RegionCode {
    A
    B
    C
    0ALL
    1
    2
    3
    4
    5
    6
    7
    8
}

@enduml

