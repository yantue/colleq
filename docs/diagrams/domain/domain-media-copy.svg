@startuml
skinparam classAttributeIconSize 0

class MediaCopy <<AggregateRoot>> {
    +Id: UUID
    +EditionId: UUID
    +Location: Location
    +Notes: List<Note>
    +DateAdded?: LocalDate
    +CreatedAt: DateTime
}

class Location <<ValueObject>> {
    +Name: string
}

class Note <<ValueObject>> {
    +Text: string
    +CreatedAt: DateTime
}

Edition <.. MediaCopy

@enduml

